name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ubuild.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ubuild
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ubuild

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)
              cp "$src" ubuild.exe
              7z a "ubuild-${{ matrix.target }}.zip" ubuild.exe
              echo "ASSET=ubuild-${{ matrix.target }}.zip" >> "$GITHUB_ENV"
              ;;
            *)
              cp "$src" ubuild
              tar czf "ubuild-${{ matrix.target }}.tar.gz" ubuild
              echo "ASSET=ubuild-${{ matrix.target }}.tar.gz" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
